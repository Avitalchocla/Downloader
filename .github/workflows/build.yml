#:import Clipboard kivy.core.clipboard.Clipboard

BoxLayout:
    orientation: "vertical"
    padding: [25, 30, 25, 30]
    spacing: 18
    canvas.before:
        Color:
            rgba: (0.1, 0.11, 0.12, 1)
        Rectangle:
            pos: self.pos
            size: self.size

    Label:
        text: "ELAZAR DOWNLOADER"
        font_size: 28
        bold: True
        color: (0.15, 0.75, 0.75, 1)
        size_hint_y: 0.15

    TextInput:
        id: url_input
        hint_text: "Paste YouTube or Media Link..."
        multiline: False
        font_size: 16
        padding_y: [12, 12]
        size_hint_y: 0.12
        background_color: (0.18, 0.2, 0.22, 1)
        foreground_color: (1, 1, 1, 1)
        hint_text_color: (0.6, 0.6, 0.6, 1)
        cursor_color: (0.15, 0.75, 0.75, 1)

    Button:
        text: "📋 Paste Link"
        font_size: 18
        size_hint_y: 0.12
        on_press: app.paste_link()
        background_normal: ''
        background_color: (0.15, 0.75, 0.75, 1)
        color: (0, 0, 0, 1)

    BoxLayout:
        orientation: "horizontal"
        size_hint_y: 0.12
        spacing: 15

        Spinner:
            id: format_spinner
            text: "MP4 (Video)"
            values: ["MP4 (Video)", "MP3 (Audio)"]
            font_size: 14
            background_normal: ''
            background_color: (0.25, 0.27, 0.29, 1)

        Spinner:
            id: quality_spinner
            text: "Best Quality"
            values: ["Best Quality", "1080p", "720p", "480p", "360p"]
            font_size: 14
            background_normal: ''
            background_color: (0.25, 0.27, 0.29, 1)

    ProgressBar:
        id: progress
        max: 100
        value: 0
        size_hint_y: 0.08

    Label:
        id: status
        text: "Ready to Download"
        font_size: 16
        color: (0.8, 0.8, 0.8, 1)
        size_hint_y: 0.1
        halign: 'center'

    Button:
        text: "START DOWNLOAD"
        font_size: 22
        bold: True
        size_hint_y: 0.2
        on_press: app.start_download()
        background_normal: ''
        background_color: (0.15, 0.75, 0.75, 1)
        color: (0, 0, 0, 1)
