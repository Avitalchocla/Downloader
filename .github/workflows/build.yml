BoxLayout:
    orientation: "vertical"
    padding: [20, 30, 20, 30]
    spacing: 15
    canvas.before:
        Color:
            rgba: (0.1, 0.1, 0.1, 1)
        Rectangle:
            pos: self.pos
            size: self.size

    Label:
        text: "ELAZAR DOWNLOADER"
        font_size: 26
        bold: True
        color: (0, 0.8, 0.8, 1)
        size_hint_y: 0.15

    TextInput:
        id: url_input
        hint_text: "Paste Link Here..."
        multiline: False
        size_hint_y: 0.12
        background_color: (0.2, 0.2, 0.2, 1)
        foreground_color: (1, 1, 1, 1)

    Button:
        text: "PASTE FROM CLIPBOARD"
        size_hint_y: 0.12
        on_press: app.paste_link()
        background_color: (0, 0.6, 0.6, 1)

    Spinner:
        id: format_spinner
        text: "MP4 (Video)"
        values: ["MP4 (Video)", "MP3 (Audio)"]
        size_hint_y: 0.12

    ProgressBar:
        id: progress
        max: 100
        size_hint_y: 0.08

    Label:
        id: status
        text: "Ready"
        size_hint_y: 0.1
        halign: 'center'

    Button:
        text: "DOWNLOAD TO ELAZAR FOLDER"
        bold: True
        size_hint_y: 0.2
        on_press: app.start_download()
        background_color: (0, 0.8, 0.4, 1)
